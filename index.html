<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>ZIP Upload & Shared URL</title>

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;700&display=swap" rel="stylesheet">

  <!-- ...existing content... -->
  <link rel="stylesheet" href="styles.css">
  <script type="importmap">
  {

<body>
  <!-- ...existing content... -->
  <main class="container">
    <header>
      <h1>Upload ZIP & create shareable url</h1>
      <p class="muted">Upload a .zip, choose a short unique ID and get a link like: https://websim.com?url=ID</p>
    </header>

    <section class="uploader">
      <label class="file-row">
        <input id="fileInput" type="file" accept=".zip" />
      </label>

      <div class="form-row">
        <input id="customId" placeholder="Enter unique id (alphanumeric, -, _)" maxlength="48" />
        <button id="createBtn">Create Link</button>
      </div>

      <div id="status" aria-live="polite"></div>

      <div id="generated" class="generated" hidden>
        <p>Shareable link:</p>
        <input id="finalUrl" readonly />
        <button id="copyBtn">Copy</button>
      </div>
    </section>

    <section class="mappings">
      <h2>Your mappings</h2>
      <ul id="mapList" class="map-list"></ul>
    </section>
  </main>

  <script src="app.js" type="module"></script>
